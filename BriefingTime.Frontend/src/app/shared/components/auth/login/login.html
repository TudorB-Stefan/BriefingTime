<div class="flex justify-center text-3xl w-full h-full p-10 space-y-10">
  <div>
    <div class="font-bold mb-15">Log In:</div>
    <form #loginForm="ngForm" (ngSubmit)="login()" class="mb-15 px-10">
      <div class="flex w-full h-full">
        <div class="mb-5 space-x-10 space-y-5 mr-5">
          <p>Email </p>
          <p>Password </p>
        </div>
        <div class="space-x-10 space-y-5">
          <input
            [(ngModel)]="creds.email"
            type="text"
            name="email"
            class="w-full bg-zinc-200/50 rounded-full px-3 shadow-3xl hover:bg-zinc-200/60"
            placeholder="Enter your email">
          <input
            [(ngModel)]="creds.password"
            type="password"
            name="password"
            class=" w-full bg-zinc-200/50 rounded-full px-3 shadow-3xl hover:bg-zinc-200/60"
            placeholder="Enter your password">
        </div>
      </div>
      <button type="submit" class="bg-zinc-500 rounded-full p-2 text-zinc-300 shadow-3xl hover:text-zinc-200 hover:bg-zinc-600">LogIn</button>
    </form>
    <div>
      <p>Not Registered?</p>
      <a class="text-purple-600 hover:text-purple-700" routerLink="/register">
        Register
      </a>
    </div>
  </div>
</div>
