<div class="flex items-center justify-center w-full h-full min-h-[60vh]">
  <div class="w-full max-w-md p-8 bg-white/40 backdrop-blur-md border border-white/60 rounded-3xl shadow-xl">
    <div class="text-center mb-8">
      <h2 class="text-3xl font-extrabold text-zinc-900 tracking-tight">Welcome Back</h2>
      <p class="text-zinc-500 mt-2 text-sm">Please enter your details to sign in.</p>
    </div>
    <form #loginForm="ngForm" (ngSubmit)="login()" class="space-y-6">
      <div class="space-y-3">
        <label class="block text-base font-semibold text-zinc-900 ml-1">Email</label>
        <input
          [(ngModel)]="creds.email"
          type="email"
          name="email"
          required
          class="w-full bg-white/60 border border-white focus:bg-white rounded-full px-5 py-3 text-zinc-800 shadow-sm transition-all focus:outline-none focus:ring-2 focus:ring-purple-500 focus:border-transparent placeholder:text-zinc-400"
          placeholder="Enter your email">
      </div>
      <div class="space-y-3">
        <label class="block text-base font-semibold text-zinc-900 ml-1">Password</label>
        <input
          [(ngModel)]="creds.password"
          type="password"
          name="password"
          required
          class="w-full bg-white/60 border border-white focus:bg-white rounded-full px-5 py-3 text-zinc-800 shadow-sm transition-all focus:outline-none focus:ring-2 focus:ring-purple-500 focus:border-transparent placeholder:text-zinc-400"
          placeholder="Enter your password">
      </div>
      <button
        type="submit"
        [disabled]="!loginForm.valid"
        class="w-full bg-zinc-800 text-white font-medium text-lg rounded-full py-3 shadow-lg hover:bg-zinc-900 hover:shadow-xl active:scale-[0.98] transition-all disabled:opacity-50 disabled:cursor-not-allowed mt-4">
        Sign In
      </button>
    </form>
    <div class="mt-8 text-center text-sm text-zinc-600">
      <p>Don't have an account?
        <a routerLink="/register" class="font-bold text-purple-600 hover:text-purple-700 hover:underline transition-all">
          Register here
        </a>
      </p>
    </div>
  </div>
</div>
