<div class="flex items-center justify-center w-full h-full min-h-[70vh] py-10">
  <div class="w-full max-w-lg p-8 bg-white/40 backdrop-blur-md border border-white/60 rounded-3xl shadow-xl">
    <div class="text-center mb-8">
      <h2 class="text-3xl font-extrabold text-zinc-900 tracking-tight">Create an Account</h2>
      <p class="text-zinc-500 mt-2 text-sm">Join BriefingTime and get started today.</p>
    </div>
    <form #registerForm="ngForm" (ngSubmit)="register()" class="space-y-5">
      <div class="space-y-2">
        <label class="block text-base font-semibold text-zinc-900 ml-1">Email</label>
        <input
          [(ngModel)]="creds.email"
          type="email"
          name="email"
          required
          class="w-full bg-white/60 border border-white focus:bg-white rounded-full px-5 py-3 text-zinc-800 shadow-sm transition-all focus:outline-none focus:ring-2 focus:ring-purple-500 focus:border-transparent placeholder:text-zinc-400"
          placeholder="name@company.com">
      </div>
      <div class="space-y-2">
        <label class="block text-base font-semibold text-zinc-900 ml-1">Username</label>
        <input
          [(ngModel)]="creds.userName"
          type="text"
          name="userName"
          required
          class="w-full bg-white/60 border border-white focus:bg-white rounded-full px-5 py-3 text-zinc-800 shadow-sm transition-all focus:outline-none focus:ring-2 focus:ring-purple-500 focus:border-transparent placeholder:text-zinc-400"
          placeholder="Choose a username">
      </div>
      <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
        <div class="space-y-2">
          <label class="block text-base font-semibold text-zinc-900 ml-1">First Name</label>
          <input
            [(ngModel)]="creds.firstName"
            type="text"
            name="firstName"
            required
            class="w-full bg-white/60 border border-white focus:bg-white rounded-full px-5 py-3 text-zinc-800 shadow-sm transition-all focus:outline-none focus:ring-2 focus:ring-purple-500 focus:border-transparent placeholder:text-zinc-400"
            placeholder="Jane">
        </div>
        <div class="space-y-2">
          <label class="block text-base font-semibold text-zinc-900 ml-1">Last Name</label>
          <input
            [(ngModel)]="creds.lastName"
            type="text"
            name="lastName"
            required
            class="w-full bg-white/60 border border-white focus:bg-white rounded-full px-5 py-3 text-zinc-800 shadow-sm transition-all focus:outline-none focus:ring-2 focus:ring-purple-500 focus:border-transparent placeholder:text-zinc-400"
            placeholder="Doe">
        </div>
      </div>
      <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
        <div class="space-y-2">
          <label class="block text-base font-semibold text-zinc-900 ml-1">Password</label>
          <input
            [(ngModel)]="creds.password"
            type="password"
            name="password"
            required
            class="w-full bg-white/60 border border-white focus:bg-white rounded-full px-5 py-3 text-zinc-800 shadow-sm transition-all focus:outline-none focus:ring-2 focus:ring-purple-500 focus:border-transparent placeholder:text-zinc-400"
            placeholder="Create password">
        </div>
        <div class="space-y-2">
          <label class="block text-base font-semibold text-zinc-900 ml-1">Confirm Password</label>
          <input
            [(ngModel)]="creds.confirmPassword"
            type="password"
            name="confirmPassword"
            required
            class="w-full bg-white/60 border border-white focus:bg-white rounded-full px-5 py-3 text-zinc-800 shadow-sm transition-all focus:outline-none focus:ring-2 focus:ring-purple-500 focus:border-transparent placeholder:text-zinc-400"
            placeholder="Repeat password">
        </div>
      </div>
      <button
        type="submit"
        [disabled]="!registerForm.valid"
        class="w-full bg-zinc-800 text-white font-medium text-lg rounded-full py-3 shadow-lg hover:bg-zinc-900 hover:shadow-xl active:scale-[0.98] transition-all disabled:opacity-50 disabled:cursor-not-allowed mt-6">
        Register
      </button>
    </form>
    <div class="mt-8 text-center text-sm text-zinc-600">
      <p>Already have an account?
        <a routerLink="/login" class="font-bold text-purple-600 hover:text-purple-700 hover:underline transition-all">
          Sign in here
        </a>
      </p>
    </div>

  </div>
</div>
