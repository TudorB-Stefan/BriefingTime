<div class="flex items-center justify-center w-full h-full min-h-[70vh] py-10">

  <div class="w-full max-w-lg p-8 bg-white/40 backdrop-blur-md border border-white/60 rounded-3xl shadow-xl">

    <div class="text-center mb-8">
      <h2 class="text-3xl font-extrabold text-zinc-900 tracking-tight">Create Briefing</h2>
      <p class="text-zinc-500 mt-2 text-sm">Upload a new document for your department.</p>
    </div>

    <!-- Changed #loginForm to #briefingForm for clarity -->
    <form #briefingForm="ngForm" (ngSubmit)="submitBriefing()" class="space-y-5">

      <div class="space-y-2">
        <label class="block text-base font-semibold text-zinc-900 ml-1">Title</label>
        <input
          [(ngModel)]="creds.title"
          type="text"
          name="title"
          required
          class="w-full bg-white/60 border border-white focus:bg-white rounded-full px-5 py-3 text-zinc-800 shadow-sm transition-all focus:outline-none focus:ring-2 focus:ring-purple-500 focus:border-transparent placeholder:text-zinc-400"
          placeholder="Enter briefing title">
      </div>

      <div class="space-y-2">
        <label class="block text-base font-semibold text-zinc-900 ml-1">Description</label>
        <!-- Upgraded to a textarea so users have more room to type -->
        <textarea
          [(ngModel)]="creds.description"
          name="description"
          required
          rows="3"
          class="w-full bg-white/60 border border-white focus:bg-white rounded-2xl px-5 py-3 text-zinc-800 shadow-sm transition-all focus:outline-none focus:ring-2 focus:ring-purple-500 focus:border-transparent placeholder:text-zinc-400 resize-none"
          placeholder="What is this briefing about?"></textarea>
      </div>

      <div class="space-y-2">
        <label class="block text-base font-semibold text-zinc-900 ml-1">Department</label>
        <div class="relative">
          <select
            [(ngModel)]="creds.departmentId"
            name="departmentId"
            required
            class="w-full bg-white/60 border border-white focus:bg-white rounded-full px-5 py-3 text-zinc-800 shadow-sm transition-all focus:outline-none focus:ring-2 focus:ring-purple-500 focus:border-transparent appearance-none cursor-pointer">
            <option value="" disabled selected>Select a department...</option>
            @for (dept of departments(); track dept.id) {
              <option [value]="dept.id">{{ dept.name }}</option>
            }
          </select>
          <!-- Custom Dropdown Arrow -->
          <div class="pointer-events-none absolute inset-y-0 right-0 flex items-center px-5 text-zinc-500">
            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7" />
            </svg>
          </div>
        </div>
      </div>

      <div class="space-y-2">
        <label class="block text-base font-semibold text-zinc-900 ml-1">Document File</label>
        <input
          (change)="onFileSelected($event)"
          accept=".pdf,.epub"
          name="file"
          type="file"
          required
          class="w-full text-zinc-600 bg-white/60 border border-white rounded-full pl-2 pr-4 py-2 shadow-sm focus:outline-none focus:ring-2 focus:ring-purple-500 cursor-pointer transition-all
                 file:mr-4 file:py-2 file:px-4 file:rounded-full file:border-0 file:text-sm file:font-bold file:bg-purple-100 file:text-purple-700 hover:file:bg-purple-200 hover:file:text-purple-800 file:transition-colors file:cursor-pointer">
      </div>

      <button
        type="submit"
        [disabled]="!briefingForm.valid"
        class="w-full bg-zinc-800 text-white font-medium text-lg rounded-full py-3 shadow-lg hover:bg-zinc-900 hover:shadow-xl active:scale-[0.98] transition-all disabled:opacity-50 disabled:cursor-not-allowed mt-6">
        Submit Briefing
      </button>

    </form>
  </div>
</div>
