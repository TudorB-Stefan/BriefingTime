<div class="w-full max-w-5xl mx-auto p-6 md:p-10 bg-white/40 backdrop-blur-md border border-white/60 rounded-[2.5rem] shadow-xl">

  <div class="animate-fade-in w-full h-full">
    @if (isLoading()) {
      <div class="flex flex-col items-center justify-center p-12 w-full min-h-[300px] space-y-4">
        <span class="loading loading-spinner loading-lg text-purple-600"></span>
        <p class="text-zinc-500 font-medium animate-pulse">Loading live briefings...</p>
      </div>
    } @else {
      <div class="grid grid-cols-1 md:grid-cols-2 gap-6 w-full">

        @for (briefing of liveBriefings(); track briefing.id) {
          <div class="bg-white/60 backdrop-blur-md border border-white/80 rounded-[1.5rem] p-6 shadow-sm hover:shadow-xl hover:-translate-y-1 transition-all duration-300 flex flex-col h-full w-full group relative overflow-hidden">

            <div class="absolute top-0 left-0 w-1 h-full bg-gradient-to-b from-purple-500 to-indigo-500 opacity-0 group-hover:opacity-100 transition-opacity duration-300"></div>

            <a [routerLink]="['/briefing', briefing.id]" class="flex-grow cursor-pointer flex flex-col outline-none focus-visible:ring-2 focus-visible:ring-purple-500 rounded-lg">

              <div class="inline-flex self-start items-center px-3 py-1 rounded-full bg-purple-100/80 text-purple-700 text-xs font-bold tracking-wide uppercase mb-3">
                {{ briefing.departmentName || 'General' }}
              </div>

              <h3 class="font-extrabold text-xl text-zinc-900 mb-2 line-clamp-2 group-hover:text-purple-700 transition-colors">
                {{ briefing.title }}
              </h3>

              <div class="mt-auto pt-6 flex items-center text-sm font-semibold text-purple-600 group-hover:text-purple-700 transition-colors">
                Read Briefing
                <svg class="w-4 h-4 ml-1 transform group-hover:translate-x-1 transition-transform" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                  <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7" />
                </svg>
              </div>
            </a>

          </div>

        } @empty {
          <div class="col-span-1 md:col-span-2 bg-white/40 backdrop-blur-md border-2 border-dashed border-white/80 rounded-[2rem] p-12 text-center flex flex-col items-center justify-center w-full shadow-sm min-h-[300px]">
            <div class="w-16 h-16 bg-zinc-100 text-zinc-400 rounded-full flex items-center justify-center mb-4 shadow-inner">
              <svg class="w-8 h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 13h6m-3-3v6m5 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"></path>
              </svg>
            </div>
            <h3 class="text-xl font-bold text-zinc-900">No Publishings Yet</h3>
            <p class="text-zinc-500 mt-2 max-w-sm">No briefings have been uploaded for now.</p>
          </div>
        }

      </div>
    }
  </div>
</div>
