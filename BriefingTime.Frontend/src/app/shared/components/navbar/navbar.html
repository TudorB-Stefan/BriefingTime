<div class="fixed top-4 inset-x-0 z-50 flex justify-center px-4 pointer-events-none">
  <nav class="pointer-events-auto w-full max-w-5xl bg-white/75 backdrop-blur-xl border border-white/40 shadow-[0_8px_30px_rgb(0,0,0,0.06)] rounded-full px-3 py-2 flex items-center justify-between transition-all">
    <a routerLink="/" class="flex items-center gap-2 pl-2 hover:opacity-80 transition-opacity">
      <div class="w-8 h-8 rounded-full bg-gradient-to-br from-purple-600 to-indigo-600 flex items-center justify-center shadow-inner">
        <svg class="w-4 h-4 text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5">
          <path stroke-linecap="round" stroke-linejoin="round" d="M13 10V3L4 14h7v7l9-11h-7z" />
        </svg>
      </div>
      <span class="text-lg font-bold tracking-tight text-zinc-900 hidden sm:block">
        Briefing<span class="text-transparent bg-clip-text bg-gradient-to-r from-purple-600 to-indigo-600">Time</span>
      </span>
    </a>

    <div class="flex items-center gap-1 sm:gap-2">

      @if (authService.currentUser(); as user) {

        @if (authService.isAdmin()) {
          <a routerLink="/admin"
             routerLinkActive="bg-zinc-100 text-zinc-900"
             class="flex items-center gap-1.5 px-3 py-1.5 text-sm font-medium text-zinc-500 hover:text-zinc-900 hover:bg-zinc-100/80 rounded-full transition-colors">
            <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
              <path stroke-linecap="round" stroke-linejoin="round" d="M9 12l2 2 4-4m5.618-4.016A11.955 11.955 0 0112 2.944a11.955 11.955 0 01-8.618 3.04A12.02 12.02 0 003 9c0 5.591 3.824 10.29 9 11.622 5.176-1.332 9-6.03 9-11.622 0-1.042-.133-2.052-.382-3.016z" />
            </svg>
            <span class="hidden md:inline">Admin</span>
          </a>
        }

        <a routerLink="/create-briefing"
           routerLinkActive="bg-purple-50 text-purple-700"
           class="flex items-center gap-1.5 px-3 py-1.5 text-sm font-medium text-purple-600 hover:text-purple-700 hover:bg-purple-50 rounded-full transition-colors">
          <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
            <path stroke-linecap="round" stroke-linejoin="round" d="M12 4v16m8-8H4" />
          </svg>
          <span class="hidden sm:inline">Create</span>
        </a>

        <div class="w-px h-5 bg-zinc-200 mx-1 hidden sm:block"></div>

        <a routerLink="/my-account"
           class="flex items-center gap-2 pl-1.5 pr-3 py-1.5 text-sm font-medium text-zinc-700 hover:bg-zinc-100 rounded-full transition-all border border-transparent hover:border-zinc-200/60 active:scale-95">
          {{ user.userName }}
        </a>
        <button (click)="authService.logout()"
                title="Log out"
                class="p-2 text-zinc-400 hover:text-red-600 hover:bg-red-50 rounded-full transition-colors active:scale-90 cursor-pointer">
          <svg class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
            <path stroke-linecap="round" stroke-linejoin="round" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1" />
          </svg>
        </button>
      } @else {
        <a routerLink="/login"
           class="px-4 py-2 text-sm font-medium text-zinc-600 hover:text-zinc-900 hover:bg-zinc-100 rounded-full transition-colors">
          Log in
        </a>
        <a routerLink="/register"
           class="px-5 py-2 text-sm font-medium text-white bg-zinc-900 hover:bg-zinc-800 active:scale-95 shadow-sm hover:shadow-md rounded-full transition-all">
          Register
        </a>

      }
    </div>
  </nav>
</div>

<div class="h-24"></div>
