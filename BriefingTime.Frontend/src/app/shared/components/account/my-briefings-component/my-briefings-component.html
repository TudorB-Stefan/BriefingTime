<div class="animate-fade-in">
  @if (isLoading()) {
    <div class="flex justify-center p-10">
      <span class="loading loading-spinner loading-lg text-purple-600"></span>
    </div>
  } @else {
    @for (briefing of liveBriefings(); track briefing.id) {
      <div class="bg-white rounded-2xl shadow-sm border border-zinc-200 p-4 hover:shadow-md transition-shadow flex justify-between items-center">

        <a [routerLink]="['/briefing', briefing.id]" class="block hover:opacity-80 transition-opacity">
          <h3 class="font-bold text-lg text-purple-700">{{ briefing.title }}</h3>
          <p class="text-sm text-zinc-500 line-clamp-1">
            {{ briefing.departmentName || 'No description provided.' }}
          </p>
        </a>

        <div class="flex gap-2">
          <button class="px-3 py-1 text-sm font-medium text-purple-600 border border-purple-600 rounded-lg hover:bg-purple-600 hover:text-white transition-colors">
            Edit
          </button>
        </div>

      </div>
    } @empty {
      <div class="bg-zinc-100 border-2 border-dashed border-zinc-300 rounded-2xl p-10 text-center flex flex-col items-center justify-center">
        <svg class="w-12 h-12 text-zinc-400 mb-3" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 13h6m-3-3v6m5 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"></path>
        </svg>
        <h3 class="text-lg font-medium text-zinc-700">No Publishings Yet</h3>
        <p class="text-zinc-500 mt-1">You haven't uploaded any briefings.</p>
      </div>
    }
  }
</div>
