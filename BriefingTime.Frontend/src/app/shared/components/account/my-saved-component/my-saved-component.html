<div class="animate-fade-in w-full h-full">
  @if (isLoading()) {
    <div class="flex flex-col items-center justify-center p-12 w-full min-h-[300px] space-y-4">
      <span class="loading loading-spinner loading-lg text-purple-600"></span>
      <p class="text-zinc-500 font-medium animate-pulse">Loading saved briefings...</p>
    </div>
  } @else {
    <div class="grid grid-cols-1 md:grid-cols-2 gap-6 w-full">

      @for (briefing of savedBriefings(); track briefing.briefingId) {
        <div class="bg-white/60 backdrop-blur-md border border-white/80 rounded-[1.5rem] p-6 shadow-sm hover:shadow-xl hover:-translate-y-1 transition-all duration-300 flex flex-col h-full w-full group relative overflow-hidden">

          <div class="absolute top-0 left-0 w-1 h-full bg-gradient-to-b from-amber-400 to-orange-500 opacity-0 group-hover:opacity-100 transition-opacity duration-300"></div>

          <a [routerLink]="['/briefing', briefing.briefingId]" class="flex-grow cursor-pointer block outline-none focus-visible:ring-2 focus-visible:ring-purple-500 rounded-lg">

            <div class="inline-flex items-center gap-1.5 px-3 py-1 rounded-full bg-amber-100/80 text-amber-700 text-xs font-bold tracking-wide uppercase mb-3">
              <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z" />
              </svg>
              {{ briefing.author || 'Unknown Author' }}
            </div>

            <h3 class="font-extrabold text-xl text-zinc-900 mb-2 line-clamp-2 group-hover:text-purple-700 transition-colors">
              {{ briefing.briefingTitle }}
            </h3>

            <div class="mt-4 flex items-center text-sm font-semibold text-purple-600 group-hover:text-purple-700 transition-colors mb-4">
              Read Briefing
              <svg class="w-4 h-4 ml-1 transform group-hover:translate-x-1 transition-transform" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7" />
              </svg>
            </div>
          </a>

          <div class="mt-auto pt-4 border-t border-zinc-200/60">
            <button (click)="deleteLiveBriefings(briefing.briefingId)" class="w-full flex items-center justify-center py-2.5 px-4 text-sm font-semibold text-zinc-600 bg-zinc-100/80 hover:bg-red-50 hover:text-red-600 rounded-xl transition-colors cursor-pointer active:scale-95">
              <svg class="w-4 h-4 mr-1.5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 5a2 2 0 012-2h10a2 2 0 012 2v16l-7-3.5L5 21V5z" />
                <line x1="4" y1="4" x2="20" y2="20" stroke-width="2" stroke-linecap="round" />
              </svg>
              Remove from Saves
            </button>
          </div>

        </div>

      } @empty {
        <div class="col-span-1 md:col-span-2 bg-white/40 backdrop-blur-md border-2 border-dashed border-white/80 rounded-[2rem] p-12 text-center flex flex-col items-center justify-center w-full shadow-sm min-h-[300px]">
          <div class="w-16 h-16 bg-amber-50 text-amber-500 rounded-full flex items-center justify-center mb-4 shadow-inner">
            <svg class="w-8 h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 5a2 2 0 012-2h10a2 2 0 012 2v16l-7-3.5L5 21V5z" />
            </svg>
          </div>
          <h3 class="text-xl font-bold text-zinc-900">No Saves Yet</h3>
          <p class="text-zinc-500 mt-2 max-w-sm">You haven't saved any briefings for later.</p>
        </div>
      }

    </div>
  }
</div>
